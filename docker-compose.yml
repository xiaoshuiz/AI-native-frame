services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-native-frame-api
    env_file:
      - .env
    environment:
      AINF_LLM_PROVIDER: ${AINF_LLM_PROVIDER:-mock}
      AINF_LLM_MODEL: ${AINF_LLM_MODEL:-gpt-4.1-mini}
      AINF_OPENAI_API_KEY: ${AINF_OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: ai-native-frame-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
